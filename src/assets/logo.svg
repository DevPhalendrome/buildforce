<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
    <!-- Teal Square Background -->
    <rect x="10" y="10" width="40" height="40" fill="#00a8a8" rx="4"/>
    
    <!-- Document Icon -->
    <g>
        <!-- Document outline -->
        <rect x="18" y="16" width="24" height="28" fill="white" rx="1"/>
        <!-- Fold corner -->
        <polygon points="40,16 40,20 36,16" fill="#1bc5c5"/>
        <!-- Lines on document -->
        <line x1="22" y1="22" x2="34" y2="22" stroke="#00a8a8" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="22" y1="27" x2="34" y2="27" stroke="#00a8a8" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="22" y1="32" x2="30" y2="32" stroke="#00a8a8" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    
    <!-- Text "BUILDFORCE" -->
    <text x="60" y="38" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#2c3e50" letter-spacing="0.5">BUILDFORCE</text>
</svg>