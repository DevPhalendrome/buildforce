name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on:
  workflow_dispatch:
  push: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version:
  workflow_dispatch:
  push: 20
      - run: npm ci
      - run: npx next build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - id: deployment
        uses: actions/deploy-pages@v4
